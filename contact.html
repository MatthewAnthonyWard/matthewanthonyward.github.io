<body>

<!-- BG shapes -->
<canvas id="string-canvas"></canvas>

 <!-- Card -->
<div class="card">

  <!-- NAV -->
  <nav class="topnav">
    <div class="nav-brand">
      <div class="nav-icon">MW</div>
      <span class="nav-name">Matthew Ward</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Summary</a></li>

      <li><a href="publications.html">Publications</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-body">
      <h1 class="hero-title">Get in Touch</h1>
      <p class="hero-desc">Reach out to ask about my current research or to suggest colloborating on a future project.</p>
    </div>
  </section>
  <div style="height: 4vh;"></div>
  <section class="contact">
    <div class="contact-wrapper">
      <form action="https://formspree.io/f/xojkagwr" method="POST">
      <input type="text" name="name" placeholder="Your name" required>
      <input type="email" name="email" placeholder="Your email address" required>
      <textarea name="message" placeholder="Your message" required></textarea>
      <button type = "submit">
        <div class="svg-wrapper-1">
          <div class="svg-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <path fill="none" d="M0 0h24v24H0z"></path>
              <path
                fill="currentColor"
                d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z"
              ></path>
            </svg>
          </div>
        </div>
        <span>Send</span>
      </button>

      </form>
    </div>
  </section>


  <!-- FOOTER -->
  <footer class="footer">
    <div class="f-social">
      <a href="https://www.linkedin.com/in/matthew-ward-631987b4/">LinkedIn</a>

  </footer>
